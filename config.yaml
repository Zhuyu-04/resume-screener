# 评分维度配置 —— 可自由增删维度、修改权重与匹配规则
dimensions:
  - name: "技术技能"
    weight: 0.3
    keywords:
      - "python"
      - "java"
      - "javascript"
      - "sql"
      - "docker"
      - "kubernetes"
      - "machine learning"
      - "deep learning"
      - "data analysis"
      - "aws"
      - "azure"
      - "git"
    regex_patterns:
      - "\\bpython\\b"
      - "\\bjava\\b"
  - name: "工作经验"
    weight: 0.3
    keywords:
      - "experience"
      - "work"
      - "project"
    regex_patterns:
      - "\\d+[+]?\\s*years?\\s*(of)?\\s*experience"   # 如 "5+ years of experience"
  - name: "教育背景"
    weight: 0.2
    keywords:
      - "bachelor"
      - "master"
      - "phd"
      - "degree"
      - "university"
  - name: "证书"
    weight: 0.1
    keywords:
      - "certified"
      - "certification"
      - "aws certified"
      - "pmp"
  - name: "岗位匹配度 (TF-IDF)"
    weight: 0.1
    tfidf_target: |
      我们正在寻找一名 Python 后端工程师，要求熟练掌握 Python、Django/Flask，熟悉 PostgreSQL、Redis，了解 Docker 和 CI/CD 流程，并具备良好的团队协作能力。
